  <!-- Auth enhancements: confirm password + forgot password -->
  <script>
  (function () {
    // Intercept generate-plan fetch calls to inject additional_notes from textarea
    var _origFetch = window.fetch;
    window.fetch = function (url, opts) {
      if (typeof url === 'string' && url.includes('generate-plan') && opts && opts.body) {
        try {
          var body = JSON.parse(opts.body);
          var notesEl = document.getElementById('plan-additional-notes');
          var notesVal = notesEl && notesEl.value ? notesEl.value.trim() : '';
          if (notesVal) {
            body.questionnaire = Object.assign({}, body.questionnaire || {}, { additional_notes: notesVal });
            opts = Object.assign({}, opts, { body: JSON.stringify(body) });
          }
        } catch (e) {}
      }
      return _origFetch.call(this, url, opts);
    };

    var observer = new MutationObserver(function () {
      enhanceSignup();
      enhanceLogin();
      injectWorkoutsAIPlans();
      injectAlphaBadge();
      injectAIPlanNotes();
    });
    observer.observe(document.body, { childList: true, subtree: true });

    // ── AI Plans banner on the Workout History page ──────────────────────────
    function injectWorkoutsAIPlans() {
      var container = document.getElementById('history-list-container');
      if (!container || container.dataset.aiPlansInjected) return;
      container.dataset.aiPlansInjected = '1';
      var banner = document.createElement('a');
      banner.href = '#/plans/generate';
      banner.style.cssText = [
        'display:flex;align-items:center;gap:14px;',
        'background:linear-gradient(135deg,rgba(255,107,0,0.12),rgba(255,107,0,0.04));',
        'border:1px solid var(--accent);border-radius:var(--radius-md);',
        'padding:14px 16px;margin-bottom:16px;text-decoration:none;color:var(--text-primary);'
      ].join('');
      banner.innerHTML =
        '<div style="font-size:26px;flex-shrink:0;">🤖</div>' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-weight:700;font-size:13px;color:var(--accent);">Generate an AI Training Plan</div>' +
          '<div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">Let AI build a personalised program based on your goals and equipment.</div>' +
        '</div>' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14" style="flex-shrink:0;color:var(--text-tertiary);"><path d="M9 18l6-6-6-6"/></svg>';
      container.parentNode.insertBefore(banner, container);
    }

    // ── Alpha badge in mobile header ─────────────────────────────────────────
    function injectAlphaBadge() {
      var header = document.getElementById('mobile-header');
      if (!header || header.dataset.alphaBadge) return;
      header.dataset.alphaBadge = '1';
      var badge = document.createElement('span');
      badge.textContent = 'ALPHA';
      badge.style.cssText = [
        'font-size:9px;font-weight:800;letter-spacing:1px;',
        'background:var(--accent);color:#fff;',
        'padding:2px 7px;border-radius:20px;',
        'margin-left:6px;vertical-align:middle;',
        'font-family:var(--font-display,sans-serif);'
      ].join('');
      var logoText = header.querySelector('.logo-text');
      if (logoText) logoText.after(badge);
    }

    // ── Additional notes textarea on AI Plans generator ───────────────────────
    function injectAIPlanNotes() {
      // Look for any form that contains a generate/submit button on the plans page
      var form = document.querySelector('.plan-form, #plan-form, form.generate-plan-form');
      if (!form) {
        // Fallback: find the form on the generate plan view by its submit button
        var btns = document.querySelectorAll('button[type="submit"]');
        for (var i = 0; i < btns.length; i++) {
          var f = btns[i].closest('form');
          if (f && !f.id.includes('login') && !f.id.includes('signup')) {
            var container = f.closest('[class*="plan"], [class*="generate"], [id*="plan"], [id*="generate"]');
            if (container) { form = f; break; }
          }
        }
      }
      if (!form || form.dataset.notesInjected) return;
      form.dataset.notesInjected = '1';

      var wrap = document.createElement('div');
      wrap.className = 'form-group';
      wrap.style.cssText = 'margin-top:4px;';
      wrap.innerHTML =
        '<label class="form-label" style="font-size:13px;">Additional notes <span style="color:var(--text-tertiary);font-weight:400;">(optional)</span></label>' +
        '<textarea id="plan-additional-notes" class="form-input" rows="3" ' +
          'placeholder="e.g. I train at home, prefer compound lifts, avoid barbell squats due to knee pain…" ' +
          'style="resize:vertical;min-height:72px;font-size:13px;"></textarea>';

      // Insert before the submit button so it appears at the bottom of the form
      var submitBtn = form.querySelector('button[type="submit"]');
      if (submitBtn) {
        submitBtn.parentNode.insertBefore(wrap, submitBtn);
      } else {
        form.appendChild(wrap);
      }
    }


    function enhanceSignup() {
      var form = document.getElementById('signup-form');
      if (!form || form.dataset.authEnhanced) return;
      form.dataset.authEnhanced = '1';

      // Insert confirm-password field after the password field
      var pwInput = document.getElementById('signup-password');
      if (!pwInput) return;
      var pwGroup = pwInput.closest('.form-group');
      var confirmGroup = document.createElement('div');
      confirmGroup.className = 'form-group';
      confirmGroup.innerHTML =
        '<label class="form-label">Confirm Password</label>' +
        '<input type="password" class="form-input" placeholder="Re-enter your password" id="signup-confirm-password" required>';
      pwGroup.after(confirmGroup);

      // Validate match before the app's own submit handler (capture phase)
      form.addEventListener('submit', function (e) {
        var pw      = document.getElementById('signup-password').value;
        var confirm = document.getElementById('signup-confirm-password').value;
        var errEl   = document.getElementById('signup-error');
        if (pw !== confirm) {
          e.stopImmediatePropagation();
          errEl.textContent    = 'Passwords do not match.';
          errEl.style.display  = 'block';
        }
      }, true);
    }

    function enhanceLogin() {
      var form = document.getElementById('login-form');
      if (!form || form.dataset.authEnhanced) return;
      form.dataset.authEnhanced = '1';

      // Insert "Forgot password?" link below the password field
      var pwInput = document.getElementById('login-password');
      if (!pwInput) return;
      var pwGroup = pwInput.closest('.form-group');
      var forgotWrap = document.createElement('div');
      forgotWrap.style.cssText = 'text-align:right;margin-top:-4px;margin-bottom:12px;font-size:13px;';
      forgotWrap.innerHTML =
        '<a href="#" id="forgot-pw-link" style="color:var(--accent);text-decoration:none;">Forgot password?</a>';
      pwGroup.after(forgotWrap);

      document.getElementById('forgot-pw-link').addEventListener('click', async function (e) {
        e.preventDefault();
        var email = (document.getElementById('login-email').value || '').trim();
        if (!email) { showToast('Enter your email address first', 'error'); return; }
        this.textContent = 'Sending…';
        var self = this;
        try {
          var result = await supabaseClient.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/#/reset-password'
          });
          if (result.error) throw result.error;
          showToast('Password reset email sent! Check your inbox.', 'success', 5000);
          self.textContent = 'Email sent ✓';
        } catch (err) {
          showToast('Could not send reset email: ' + (err.message || err), 'error');
          self.textContent = 'Forgot password?';
        }
      });
    }
  })();
  </script>
